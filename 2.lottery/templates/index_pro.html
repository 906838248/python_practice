<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽奖系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 32px;
        }
        .section {
            margin-bottom: 30px;
        }
        .section-title {
            font-size: 20px;
            color: #555;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .people-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border: 2px solid #e9ecef;
        }
        .person {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.3);
        }
        .winner-section {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 15px;
            margin-bottom: 30px;
        }
        .winner-label {
            font-size: 24px;
            color: white;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .winner-name {
            font-size: 48px;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }
        .btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            min-width: 150px;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-lottery {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        .btn-lottery:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(245, 87, 108, 0.4);
        }
        .btn-input {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        .btn-input:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 172, 254, 0.4);
        }
        .empty-hint {
            color: #999;
            font-style: italic;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>抽奖系统</h1>
        
        {% if winner %}
        <div class="winner-section">
            <div class="winner-label">恭喜中奖</div>
            <div class="winner-name">{{ winner }}</div>
        </div>
        {% endif %}
        
        <div class="section">
            <div class="section-title">抽奖名单（共 {{ people|length }} 人）</div>
            <div class="people-list">
                {% if people %}
                    {% for person in people %}
                        <div class="person">{{ person }}</div>
                    {% endfor %}
                {% else %}
                    <div class="empty-hint">暂无名单，请点击下方按钮添加</div>
                {% endif %}
            </div>
        </div>
        
        <div class="btn-group">
            {% if people %}
                <a href="/lottery?people={{ people|join(',') }}" style="text-decoration: none; flex: 1;">
                    <button class="btn-lottery">开始抽奖</button>
                </a>
            {% else %}
                <button class="btn-lottery" disabled>开始抽奖</button>
            {% endif %}
            <a href="/input" style="text-decoration: none; flex: 1;">
                <button class="btn-input">输入名单</button>
            </a>
        </div>
    </div>
</body>
</html>
